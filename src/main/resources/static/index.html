<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP - Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .main-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .main-header h2 { font-weight: 700; color: var(--text-main); }
        .main-header p { color: var(--text-muted); }

        .card {
            background-color: var(--bg-card);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .form-label { font-weight: 500; color: var(--text-main); font-size: 0.9rem; }

        .form-control, .form-select {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: #10b981; border: none; border-radius: 8px; }

        .table thead th {
            background-color: #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            border-top: none;
        }

        .table tbody td { vertical-align: middle; color: var(--text-main); border-bottom: 1px solid #f1f5f9; }

        .badge-id {
            background-color: #eef2ff;
            color: var(--primary-color);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .action-link { font-size: 0.85rem; font-weight: 600; text-decoration: none; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h2>Manajemen Data Penduduk</h2>
        <p>Kelola informasi Kartu Tanda Penduduk dengan integrasi AJAX dan Spring Boot.</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 id="formTitle" class="mb-4 fw-bold">Tambah Penduduk Baru</h5>
                <form id="ktpForm">
                    <input type="hidden" id="ktpId">
                    <div class="mb-3">
                        <label for="nomorKtp" class="form-label">Nomor KTP</label>
                        <input type="text" id="nomorKtp" class="form-control" placeholder="16 digit angka" required>
                    </div>
                    <div class="mb-3">
                        <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                        <input type="text" id="namaLengkap" class="form-control" placeholder="Nama sesuai identitas" required>
                    </div>
                    <div class="mb-3">
                        <label for="alamat" class="form-label">Alamat</label>
                        <textarea id="alamat" class="form-control" rows="2" placeholder="Alamat lengkap domisili" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tanggalLahir" class="form-label">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="jenisKelamin" class="form-label">Jenis Kelamin</label>
                            <select id="jenisKelamin" class="form-select" required>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 mt-2">Simpan Data</button>
                    <button type="button" id="btnCancel" onclick="resetForm()" class="btn btn-link w-100 mt-2 text-secondary text-decoration-none" style="display:none; font-size: 0.9rem;">Batalkan Perubahan</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-0 overflow-hidden">
                <div class="p-4 border-bottom bg-white">
                    <h5 class="m-0 fw-bold">Database Penduduk</h5>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th class="ps-4">NOMOR KTP</th>
                            <th>NAMA LENGKAP</th>
                            <th class="text-end pe-4">AKSI</th>
                        </tr>
                        </thead>
                        <tbody id="ktpTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function loadData() {
        $.get('/ktp', function(data) {
            let rows = '';
            data.forEach(ktp => {
                const ktpStr = JSON.stringify(ktp).replace(/"/g, '&quot;');
                rows += `
                    <tr>
                        <td class="ps-4"><span class="badge-id">${ktp.nomorKtp}</span></td>
                        <td>
                            <div class="fw-bold">${ktp.namaLengkap}</div>
                            <div class="small text-muted">${ktp.jenisKelamin}</div>
                        </td>
                        <td class="text-end pe-4">
                            <a onclick="fillForm(${ktpStr})" class="action-link text-primary">Edit</a>
                            <a onclick="deleteData(${ktp.id})" class="action-link text-danger">Hapus</a>
                        </td>
                    </tr>`;
            });
            $('#ktpTableBody').html(rows);
        });
    }

    function fillForm(ktp) {
        $('#ktpId').val(ktp.id);
        $('#nomorKtp').val(ktp.nomorKtp);
        $('#namaLengkap').val(ktp.namaLengkap);
        $('#alamat').val(ktp.alamat);
        $('#tanggalLahir').val(ktp.tanggalLahir);
        $('#jenisKelamin').val(ktp.jenisKelamin);

        $('#formTitle').text('Edit Data Penduduk');
        $('#btnSubmit').text('Simpan Perubahan').addClass('btn-success').removeClass('btn-primary');
        $('#btnCancel').show();
        window.scrollTo(0, 0);
    }

    function resetForm() {
        $('#ktpForm')[0].reset();
        $('#ktpId').val('');
        $('#formTitle').text('Tambah Penduduk Baru');
        $('#btnSubmit').text('Simpan Data').addClass('btn-primary').removeClass('btn-success');
        $('#btnCancel').hide();
    }

    $('#ktpForm').submit(function(e) {
        e.preventDefault();
        const id = $('#ktpId').val();
        const url = id ? '/ktp/' + id : '/ktp';
        const method = id ? 'PUT' : 'POST';

        const payload = {
            nomorKtp: $('#nomorKtp').val(),
            namaLengkap: $('#namaLengkap').val(),
            alamat: $('#alamat').val(),
            tanggalLahir: $('#tanggalLahir').val(),
            jenisKelamin: $('#jenisKelamin').val()
        };

        $.ajax({
            url: url,
            type: method,
            contentType: 'application/json',
            data: JSON.stringify(payload),
            success: function() {
                alert(id ? 'Data berhasil diperbarui!' : 'Data baru berhasil disimpan!');
                resetForm();
                loadData();
            },
            error: function(xhr) {
                alert('Error ' + xhr.status + ': Terjadi kendala pada server.');
            }
        });
    });

    function deleteData(id) {
        if (confirm('Apakah Anda yakin ingin menghapus data ini secara permanen?')) {
            $.ajax({
                url: '/ktp/' + id,
                type: 'DELETE',
                success: function() {
                    alert('Data KTP berhasil dihapus');
                    loadData();
                },
                error: function(err) {
                    alert('Gagal menghapus data: ' + err.status);
                }
            });
        }
    }

    $(document).ready(loadData);
</script>
</body>
</html>
