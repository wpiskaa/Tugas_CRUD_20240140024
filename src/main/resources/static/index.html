<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen KTP - Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #000000; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding-top: 50px; }
        .card { background-color: #1c1c1e; border: none; border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control, .form-select { background-color: #2c2c2e; border: 1px solid #3a3a3c; color: #f5f5f7; border-radius: 10px; }
        .form-control:focus { background-color: #3a3a3c; color: #fff; border-color: #0071e3; box-shadow: none; }
        .btn-primary { background-color: #0071e3; border: none; border-radius: 10px; padding: 10px 20px; font-weight: 600; }
        .btn-primary:hover { background-color: #0077ed; }
        .btn-success { background-color: #34c759; border: none; border-radius: 10px; }
        .table { color: #f5f5f7; }
        .badge-id { background-color: #2c2c2e; color: #86868b; padding: 5px 10px; border-radius: 6px; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="card p-4">
                <h4 id="formTitle" class="mb-4 fw-bold">Daftarkan Penduduk</h4>
                <form id="ktpForm">
                    <input type="hidden" id="ktpId">
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Nomor KTP</label>
                        <input type="text" id="nomorKtp" class="form-control" placeholder="16 Digit Nomor KTP" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Nama Lengkap</label>
                        <input type="text" id="namaLengkap" class="form-control" placeholder="Sesuai Akta Kelahiran" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Alamat</label>
                        <textarea id="alamat" class="form-control" rows="2" placeholder="Alamat Domisili" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small text-secondary">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small text-secondary">Gender</label>
                            <select id="jenisKelamin" class="form-select" required>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 mt-2">Simpan Data</button>
                    <button type="button" id="btnCancel" onclick="resetForm()" class="btn btn-link w-100 mt-2 text-secondary text-decoration-none" style="display:none;">Batalkan</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <h4 class="mb-4 fw-bold">Database Penduduk</h4>
                <div class="table-responsive">
                    <table class="table table-hover mt-2">
                        <thead>
                        <tr class="text-secondary small border-bottom border-dark">
                            <th>NOMOR KTP</th>
                            <th>NAMA</th>
                            <th class="text-end">AKSI</th>
                        </tr>
                        </thead>
                        <tbody id="ktpTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Memuat data dari server
    function loadData() {
        $.get('/ktp', function(data) {
            let rows = '';
            data.forEach(ktp => {
                const ktpStr = JSON.stringify(ktp).replace(/"/g, '&quot;');
                rows += `
                    <tr class="align-middle">
                        <td><span class="badge-id">${ktp.nomorKtp}</span></td>
                        <td>
                            <div class="fw-bold">${ktp.namaLengkap}</div>
                            <div class="small text-secondary">${ktp.jenisKelamin}</div>
                        </td>
                        <td class="text-end">
                            <button onclick="fillForm(${ktpStr})" class="btn btn-link btn-sm text-primary text-decoration-none">Edit</button>
                            <button onclick="deleteData(${ktp.id})" class="btn btn-link btn-sm text-danger text-decoration-none">Hapus</button>
                        </td>
                    </tr>`;
            });
            $('#ktpTableBody').html(rows);
        });
    }

    // Mengisi form untuk proses Edit
    function fillForm(ktp) {
        $('#ktpId').val(ktp.id);
        $('#nomorKtp').val(ktp.nomorKtp);
        $('#namaLengkap').val(ktp.namaLengkap);
        $('#alamat').val(ktp.alamat);
        $('#tanggalLahir').val(ktp.tanggalLahir);
        $('#jenisKelamin').val(ktp.jenisKelamin);

        $('#formTitle').text('Perbarui Data');
        $('#btnSubmit').text('Update Sekarang').addClass('btn-success').removeClass('btn-primary');
        $('#btnCancel').show();
    }

    // Mengatur ulang form ke kondisi awal
    function resetForm() {
        $('#ktpForm')[0].reset();
        $('#ktpId').val('');
        $('#formTitle').text('Daftarkan Penduduk');
        $('#btnSubmit').text('Simpan Data').addClass('btn-primary').removeClass('btn-success');
        $('#btnCancel').hide();
    }

    // Menangani Submit Form (Create & Update)
    $('#ktpForm').submit(function(e) {
        e.preventDefault();
        const id = $('#ktpId').val();

        // Penentuan URL dan Method
        const url = id ? '/ktp/' + id : '/ktp';
        const method = id ? 'PUT' : 'POST';

        const payload = {
            nomorKtp: $('#nomorKtp').val(),
            namaLengkap: $('#namaLengkap').val(),
            alamat: $('#alamat').val(),
            tanggalLahir: $('#tanggalLahir').val(),
            jenisKelamin: $('#jenisKelamin').val()
        };

        $.ajax({
            url: url,
            type: method,
            contentType: 'application/json',
            data: JSON.stringify(payload),
            success: function() {
                alert(id ? 'Data KTP berhasil diperbarui' : 'Data KTP berhasil disimpan');
                resetForm();
                loadData();
            },
            error: function(xhr) {
                alert('Error ' + xhr.status + ': Terjadi kesalahan pada server');
            }
        });
    });

    // Menangani Penghapusan Data
    function deleteData(id) {
        if (confirm('Data ini akan dihapus permanent, lanjutkan?')) {
            $.ajax({
                url: '/ktp/' + id,
                type: 'DELETE',
                success: function() {
                    alert('Data KTP berhasil dihapus');
                    loadData();
                },
                error: function(err) {
                    alert('Gagal menghapus data: ' + err.status);
                }
            });
        }
    }

    $(document).ready(loadData);
</script>
</body>
</html>
